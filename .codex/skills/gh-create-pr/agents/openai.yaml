interface:
  display_name: "GitHub PR Creator"
  short_description: "Ask first, then create prefixed Korean PR"
  default_prompt: "Use $gh-create-pr to first ask me for a PR title, PR description, type prefix, and whether this should be a draft PR, turn them into a polished Korean pull request, format the final title like feat: ..., assign it to me, include a Closes #issue footer based on the current type-#issue branch, and pass --draft when I request a draft PR."
